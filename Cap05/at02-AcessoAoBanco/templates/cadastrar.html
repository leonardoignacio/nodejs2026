<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Cadastrar Pet</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <style>
    * {
      box-sizing: border-box;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      margin: 0;
      background: linear-gradient(135deg, #6dd5ed, #2193b0);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .container {
      background: #fff;
      padding: 30px;
      border-radius: 12px;
      width: 100%;
      max-width: 500px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.15);
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
      color: #333;
    }

    .form-group {
      margin-bottom: 15px;
    }

    label {
      display: block;
      margin-bottom: 5px;
      font-weight: 600;
      color: #555;
    }

    input, select, textarea {
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
      transition: 0.2s;
    }

    input:focus, select:focus, textarea:focus {
      border-color: #2193b0;
      outline: none;
      box-shadow: 0 0 5px rgba(33,147,176,0.3);
    }

    .row {
      display: flex;
      gap: 10px;
    }

    .row .form-group {
      flex: 1;
    }

    button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      background: #2193b0;
      color: white;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #176d82;
    }
  </style>
</head>

<body>
  <div class="container">
    <h2>🐾 Cadastrar Novo Pet</h2>

    <form action="/cadastrar/pets" method="POST">
      
      <div class="form-group">
        <label for="id_cli">ID do Dono</label>
        <input type="number" name="id_cli" required>
      </div>

      <div class="form-group">
        <label for="nome">Nome do Pet</label>
        <input type="text" name="nome" required>
      </div>

      <div class="row">
        <div class="form-group">
          <label for="sexo">Sexo</label>
          <select name="sexo">
            <option value="">Selecione</option>
            <option value="M">M</option>
            <option value="F">F</option>
          </select>
        </div>

        <div class="form-group">
          <label for="idade">Idade</label>
          <input type="number" name="idade">
        </div>
      </div>

      <div class="form-group">
        <label for="especie">Espécie</label>
        <input type="text" name="especie" required>
      </div>

      <div class="form-group">
        <label for="raca">Raça</label>
        <input type="text" name="raca">
      </div>

      <div class="row">
        <div class="form-group">
          <label for="peso">Peso (kg)</label>
          <input type="number" step="0.01" name="peso">
        </div>

        <div class="form-group">
          <label for="tamanho">Tamanho</label>
          <input type="text" name="tamanho">
        </div>
      </div>

      <div class="form-group">
        <label for="doenca">Doença</label>
        <input type="text" name="doenca">
      </div>

      <div class="form-group">
        <label for="obs">Observações</label>
        <textarea name="obs" rows="3"></textarea>
      </div>

      <button type="submit">Cadastrar Pet</button>
    </form>
  </div>
</body>
</html>
